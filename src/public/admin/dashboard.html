<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-blue-950 text-white">

<div class="min-h-screen flex">

  <!-- SIDEBAR -->
  <aside class="w-64 hidden lg:flex flex-col p-6 bg-blue-950/50 border-r border-blue-900">
    
    <div class="mb-12">
      <h2 class="text-xl font-black italic uppercase">
        ADMIN<span class="text-blue-400">CORE</span>
      </h2>
    </div>

    <nav class="flex-grow space-y-2">
      <button class="w-full flex items-center gap-3 px-4 py-3 rounded-xl bg-blue-600 text-white text-xs font-bold uppercase tracking-widest">
        Dashboard
      </button>
      <button onclick="window.location.href='/a/article-management'" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-blue-100/40 hover:text-white hover:bg-blue-900 text-xs font-bold uppercase tracking-widest">
        Actualités
      </button>
       <button onclick="window.location.href='/a/users'" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-blue-100/40 hover:text-white hover:bg-blue-900 text-xs font-bold uppercase tracking-widest">
        Utilisateurs
      </button>
      <button class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-blue-100/40 hover:text-white hover:bg-blue-900 text-xs font-bold uppercase tracking-widest">
        Effectif
      </button>
      <button class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-blue-100/40 hover:text-white hover:bg-blue-900 text-xs font-bold uppercase tracking-widest">
        Calendrier
      </button>
      <button class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-blue-100/40 hover:text-white hover:bg-blue-900 text-xs font-bold uppercase tracking-widest">
        Paramètres
      </button>
    </nav>

    <button class="mt-auto px-4 py-3 text-red-400 hover:bg-red-500/10 rounded-xl text-xs font-bold uppercase tracking-widest">
      Déconnexion
    </button>

  </aside>

  <!-- MAIN -->
  <main class="flex-1">

    <!-- HEADER -->
    <header class="px-6 md:px-8 py-4 border-b border-blue-900 flex justify-between items-center bg-blue-950/50 backdrop-blur sticky top-0">

      <input 
        type="text"
        placeholder="Rechercher..."
        class="bg-blue-900/30 border border-blue-800 rounded-xl px-4 py-2 text-sm w-48 md:w-80 focus:outline-none focus:border-blue-400"
      >

      <div class="flex items-center gap-4">
        <button class="p-2 bg-blue-900/30 border border-blue-800 rounded-xl">🔔</button>

        <div class="flex items-center gap-3">
          <div class="hidden sm:block text-right">
            <p class="text-xs font-bold">Admin</p>
            <p class="text-[10px] text-blue-100/40 uppercase">Super User</p>
          </div>
          <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center font-black">
            A
          </div>
        </div>
      </div>

    </header>

    <!-- CONTENT -->
    <div class="p-6 md:p-8">

      <!-- TITLE -->
      <div class="flex justify-between items-center mb-8">
        <h1 class="text-2xl md:text-3xl font-black italic uppercase">
          Tableau de <span class="text-blue-400">Bord</span>
        </h1>

        <button class="bg-blue-600 px-4 py-2 rounded-xl text-xs font-bold uppercase">
          + Nouveau
        </button>
      </div>

      <!-- STATS -->
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">

        <div class="bg-blue-900/20 border border-blue-800 p-6 rounded-3xl">
          <p class="text-3xl font-black">12</p>
          <p class="text-xs text-blue-100/40 uppercase">Articles</p>
        </div>

        <div class="bg-blue-900/20 border border-blue-800 p-6 rounded-3xl">
          <p class="text-3xl font-black">25</p>
          <p class="text-xs text-blue-100/40 uppercase">Joueurs</p>
        </div>

        <div class="bg-blue-900/20 border border-blue-800 p-6 rounded-3xl">
          <p class="text-3xl font-black">8</p>
          <p class="text-xs text-blue-100/40 uppercase">Matchs</p>
        </div>

        <div class="bg-blue-900/20 border border-blue-800 p-6 rounded-3xl">
          <p class="text-3xl font-black">42.5K</p>
          <p class="text-xs text-blue-100/40 uppercase">Vues</p>
        </div>

      </div>

      <!-- GRID -->
      <div class="grid lg:grid-cols-12 gap-8">

        <!-- ARTICLES -->
        <div class="lg:col-span-8 bg-blue-900/20 border border-blue-800 p-6 rounded-3xl">

          <div class="flex justify-between mb-6">
            <h3 class="font-black uppercase italic">Actualités Récentes</h3>
            <span class="text-blue-400 text-xs">Voir tout</span>
          </div>

          <div class="space-y-4">

            <div class="flex gap-4 p-4 bg-blue-950/30 border border-blue-900 rounded-2xl">
              <img src="https://via.placeholder.com/100" class="w-16 h-12 object-cover rounded">
              <div>
                <p class="font-bold">Titre article</p>
                <p class="text-xs text-blue-400">Match • 12 Mars</p>
              </div>
            </div>

            <div class="flex gap-4 p-4 bg-blue-950/30 border border-blue-900 rounded-2xl">
              <img src="https://via.placeholder.com/100" class="w-16 h-12 object-cover rounded">
              <div>
                <p class="font-bold">Autre article</p>
                <p class="text-xs text-blue-400">Club • 10 Mars</p>
              </div>
            </div>

          </div>

        </div>

        <!-- ACTIVITY -->
        <div class="lg:col-span-4 space-y-6">

          <div class="bg-blue-900/20 border border-blue-800 p-6 rounded-3xl">
            <h3 class="font-black uppercase mb-6">Activités</h3>

            <div class="space-y-4 text-sm">
              <p>Nouveau joueur ajouté</p>
              <p>Calendrier mis à jour</p>
              <p>Alerte serveur</p>
            </div>
          </div>

          <div class="bg-gradient-to-br from-blue-600 to-blue-800 p-6 rounded-3xl">
            <h3 class="font-black mb-3">Support</h3>
            <p class="text-sm mb-4">Besoin d'aide ?</p>
            <button class="w-full bg-white text-blue-600 py-2 rounded-xl text-xs font-bold">
              Contacter
            </button>
          </div>

        </div>

      </div>

    </div>

  </main>

</div>

</body>
</html>
