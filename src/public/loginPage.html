

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="Clinix" />
    <meta property="og:description" content="Clinix Un logiciel integrale de gestion hospitaliers" />
    <meta property="og:image" content="public.assets/images/AdobeStock_1668148879_Preview.jpeg" />
    <title>Clinix</title>
    <link rel="icon" type="png" href="public/assets/images/iconApp.png" >
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f8fafc;
        }
        
        .hospital-icon {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        .input-field:focus {
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.5);
        }
        
        .login-btn {
            transition: all 0.3s ease;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        
        .forgot-password:hover {
            text-decoration: underline;
        }
        
        .error-message {
            animation: shake 0.5s;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
        .anime-bar {
            animation: loading 5s forwards;
        }
        @keyframes loading {
            0% { width: 100%; }
            100% { width: 0%; }
        }
        /* Animation douce pour le slide */
@keyframes slide-down {
    0% { opacity: 0; transform: translateY(-20px); }
    100% { opacity: 1; transform: translateY(0); }
}
.animate-slide-down {
    animation: slide-down 0.4s ease-out;
}
    </style>
</head>
<body class="bg-blue-950 min-h-screen  p-4 text-white">

    <!-- BACKGROUND -->
<div class="fixed inset-0 overflow-hidden pointer-events-none">
  <div class="absolute top-[-10%] right-[-10%] w-[60%] h-[60%] md:w-[40%] md:h-[40%] bg-blue-600/10 rounded-full blur-[120px]"></div>
  <div class="absolute bottom-[-10%] left-[-10%] w-[60%] h-[60%] md:w-[40%] md:h-[40%] bg-blue-400/10 rounded-full blur-[120px]"></div>
</div>

    <div class="min-h-screen flex flex-col md:flex-row" id="content">
        <!-- Left Side - Hospital Image -->
        <div class="w-full md:w-1/2 flex items-center justify-center p-4">
            <!-- CARD -->
<div class="w-full max-w-md relative z-10">

  <div class="bg-blue-900/30 backdrop-blur-2xl border border-blue-800 rounded-3xl md:rounded-[2.5rem] p-12 sm:p-8 md:p-12 shadow-2xl">

    <!-- HEADER -->
    <div class="text-center mb-8 md:mb-10">

      <div class="inline-flex p-3 md:p-4 bg-blue-600/20 rounded-xl md:rounded-2xl mb-5 md:mb-6 border border-blue-500/30 text-lg md:text-xl">
        <i class="fas fa-sign-in-alt"></i>
      </div>

      <h1 class="text-2xl sm:text-3xl md:text-4xl font-black uppercase italic tracking-tight mb-2">
        Espace <span class="text-blue-400">Membre</span>
      </h1>

      <p class="text-blue-100/50 text-[10px] md:text-xs font-bold uppercase tracking-widest px-2">
        Connectez-vous pour accéder à votre compte
      </p>

    </div>

    <!-- FORM -->
    <form id="loginForm" class="space-y-5 md:space-y-6">

      <!-- EMAIL -->
      <div class="space-y-2">
        <label class="text-[9px] md:text-[10px] font-black text-blue-100/40 uppercase tracking-widest ml-1">
          Email Professionnel
        </label>

        <div class="relative">
          <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-blue-100/30"></i>

          <input
            id="email"
            type="email"
            required
            placeholder="admin@fcmunana.com"
            class="w-full bg-blue-950/50 border border-blue-800 rounded-xl md:rounded-2xl py-3 md:py-4 pl-11 md:pl-12 pr-4 text-sm md:text-base text-white placeholder:text-blue-100/20 focus:outline-none focus:border-blue-400"
          >
        </div>
      </div>

      <!-- PASSWORD -->
      <div class="space-y-2">
        <label class="text-[9px] md:text-[10px] font-black text-blue-100/40 uppercase tracking-widest ml-1">
          Mot de Passe
        </label>

        <div class="relative">
          <i class="fas fa-key absolute left-4 top-1/2 -translate-y-1/2 text-blue-100/30"></i>

          <input
            id="password"
            type="password"
            required
            placeholder="••••••••"
            class="w-full bg-blue-950/50 border border-blue-800 rounded-xl md:rounded-2xl py-3 md:py-4 pl-11 md:pl-12 pr-4 text-sm md:text-base text-white placeholder:text-blue-100/20 focus:outline-none focus:border-blue-400"
          >
        </div>
      </div>

      <!-- OPTIONS -->
      <div class="flex justify-between items-center text-[9px] md:text-[10px] font-bold uppercase tracking-widest px-1">

        <label class="flex items-center gap-2 text-blue-100/40 cursor-pointer hover:text-blue-100">
          <input type="checkbox" class="accent-blue-600 scale-90 md:scale-100">
          Se souvenir
        </label>

        <a href="#" class="text-blue-400 hover:text-white">Oublié ?</a>

      </div>

      <!-- BUTTON -->
      <button
        id="submitBtn"
        type="submit"
        class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black uppercase tracking-[0.15em] md:tracking-[0.2em] py-3 md:py-4 rounded-xl md:rounded-2xl shadow-xl flex items-center justify-center gap-3 text-sm md:text-base"
      >
        <i class="fas fa-sign-in-alt"></i>
        Connexion
      </button>

    </form>

  </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Toggle password visibility
            const togglePassword = document.getElementById('togglePassword');
            const password = document.getElementById('password');
            
            togglePassword.addEventListener('click', function() {
                const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
                password.setAttribute('type', type);
                this.innerHTML = type === 'password' ? '<i class="fas fa-eye text-gray-400 hover:text-gray-600"></i>' : '<i class="fas fa-eye-slash text-gray-400 hover:text-gray-600"></i>';
            });
            
            // Show error message if exists
            const errorContainer = document.getElementById('errorContainer');
            if (errorContainer) {
                setTimeout(() => {
                    errorContainer.classList.add('opacity-0');
                    setTimeout(() => {
                        errorContainer.classList.add('hidden');
                    }, 200);
                }, 3000);
            }
              window.addEventListener("load", () => {
      const loader = document.getElementById("loader");
      const content = document.getElementById("content");

      // Ajoute la classe d’opacité pour déclencher la transition
      loader.classList.add("opacity-0");

      // Après la transition, on cache complètement le loader
      setTimeout(() => {
        loader.style.display = "none";
        content.classList.remove("hidden"); // Affiche le contenu
      }, 900); // même durée que "duration-700"
    });
