<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Login - FC Munana</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body class="bg-blue-950 min-h-screen flex items-center justify-center p-4 text-white">

<!-- BACKGROUND -->
<div class="fixed inset-0 overflow-hidden pointer-events-none">
  <div class="absolute top-[-10%] right-[-10%] w-[60%] h-[60%] md:w-[40%] md:h-[40%] bg-blue-600/10 rounded-full blur-[120px]"></div>
  <div class="absolute bottom-[-10%] left-[-10%] w-[60%] h-[60%] md:w-[40%] md:h-[40%] bg-blue-400/10 rounded-full blur-[120px]"></div>
</div>

<!-- CARD -->
<div class="w-full max-w-md relative z-10">

  <div class="bg-blue-900/30 backdrop-blur-2xl border border-blue-800 rounded-3xl md:rounded-[2.5rem] p-6 sm:p-8 md:p-12 shadow-2xl">

    <!-- HEADER -->
    <div class="text-center mb-8 md:mb-10">

      <div class="inline-flex p-3 md:p-4 bg-blue-600/20 rounded-xl md:rounded-2xl mb-5 md:mb-6 border border-blue-500/30 text-lg md:text-xl">
        <i class="fas fa-sign-in-alt"></i>
      </div>

      <h1 class="text-2xl sm:text-3xl md:text-4xl font-black uppercase italic tracking-tight mb-2">
        Espace <span class="text-blue-400">Membre</span>
      </h1>

      <p class="text-blue-100/50 text-[10px] md:text-xs font-bold uppercase tracking-widest px-2">
        Connectez-vous pour accéder à votre compte
      </p>

    </div>

    <!-- FORM -->
    <form id="loginForm" class="space-y-5 md:space-y-6">

      <!-- EMAIL -->
      <div class="space-y-2">
        <label class="text-[9px] md:text-[10px] font-black text-blue-100/40 uppercase tracking-widest ml-1">
          Email Professionnel
        </label>

        <div class="relative">
          <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-blue-100/30"></i>

          <input
            id="email"
            type="email"
            required
            placeholder="admin@fcmunana.com"
            class="w-full bg-blue-950/50 border border-blue-800 rounded-xl md:rounded-2xl py-3 md:py-4 pl-11 md:pl-12 pr-4 text-sm md:text-base text-white placeholder:text-blue-100/20 focus:outline-none focus:border-blue-400"
          >
        </div>
      </div>

      <!-- PASSWORD -->
      <div class="space-y-2">
        <label class="text-[9px] md:text-[10px] font-black text-blue-100/40 uppercase tracking-widest ml-1">
          Mot de Passe
        </label>

        <div class="relative">
          <i class="fas fa-key absolute left-4 top-1/2 -translate-y-1/2 text-blue-100/30"></i>

          <input
            id="password"
            type="password"
            required
            placeholder="••••••••"
            class="w-full bg-blue-950/50 border border-blue-800 rounded-xl md:rounded-2xl py-3 md:py-4 pl-11 md:pl-12 pr-4 text-sm md:text-base text-white placeholder:text-blue-100/20 focus:outline-none focus:border-blue-400"
          >
        </div>
      </div>

      <!-- OPTIONS -->
      <div class="flex justify-between items-center text-[9px] md:text-[10px] font-bold uppercase tracking-widest px-1">

        <label class="flex items-center gap-2 text-blue-100/40 cursor-pointer hover:text-blue-100">
          <input type="checkbox" class="accent-blue-600 scale-90 md:scale-100">
          Se souvenir
        </label>

        <a href="#" class="text-blue-400 hover:text-white">Oublié ?</a>

      </div>

      <!-- BUTTON -->
      <button
        id="submitBtn"
        type="submit"
        class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black uppercase tracking-[0.15em] md:tracking-[0.2em] py-3 md:py-4 rounded-xl md:rounded-2xl shadow-xl flex items-center justify-center gap-3 text-sm md:text-base"
      >
        <i class="fas fa-sign-in-alt"></i>
        Connexion
      </button>

    </form>

  </div>
</div>
</body>
</html>
