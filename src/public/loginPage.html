<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - FC Munana</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-blue-950 flex items-center justify-center p-4">

  <!-- Background -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="absolute top-[-10%] right-[-10%] w-[40%] h-[40%] bg-blue-600/10 rounded-full blur-[120px]"></div>
    <div class="absolute bottom-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-400/10 rounded-full blur-[120px]"></div>
  </div>

  <!-- Card -->
  <div class="w-full max-w-md relative z-10">
    <div class="bg-blue-900/30 backdrop-blur-2xl border border-blue-800 rounded-[2.5rem] p-8 md:p-12 shadow-2xl">

      <!-- Header -->
      <div class="text-center mb-10">
        <div class="inline-flex p-4 bg-blue-600/20 rounded-2xl mb-6 border border-blue-500/30">
          🔐
        </div>
        <h1 class="text-3xl font-black text-white uppercase italic tracking-tighter mb-2">
          Espace <span class="text-blue-400">Membre</span>
        </h1>
        <p class="text-blue-100/40 text-xs font-bold uppercase tracking-widest">
          Connectez-vous pour accéder à votre compte
        </p>
      </div>

      <!-- Form -->
      <form id="loginForm" class="space-y-6">

        <!-- Email -->
        <div class="space-y-2">
          <label class="text-[10px] font-black text-blue-100/40 uppercase tracking-widest ml-1">
            Email Professionnel
          </label>
          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-blue-100/30">📧</span>
            <input
              type="email"
              id="email"
              required
              placeholder="admin@fcmunana.com"
              class="w-full bg-blue-950/50 border border-blue-800 rounded-2xl py-4 pl-12 pr-4 text-white placeholder:text-blue-100/20 focus:outline-none focus:border-blue-400 transition-colors"
            />
          </div>
        </div>

        <!-- Password -->
        <div class="space-y-2">
          <label class="text-[10px] font-black text-blue-100/40 uppercase tracking-widest ml-1">
            Mot de Passe
          </label>
          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-blue-100/30">🔒</span>
            <input
              type="password"
              id="password"
              required
              placeholder="••••••••"
              class="w-full bg-blue-950/50 border border-blue-800 rounded-2xl py-4 pl-12 pr-4 text-white placeholder:text-blue-100/20 focus:outline-none focus:border-blue-400 transition-colors"
            />
          </div>
        </div>

        <!-- Options -->
        <div class="flex items-center justify-between text-[10px] font-bold uppercase tracking-widest px-1">
          <label class="flex items-center gap-2 text-blue-100/40 cursor-pointer hover:text-blue-100 transition-colors">
            <input type="checkbox" class="accent-blue-600"> Se souvenir
          </label>
          <a href="#" class="text-blue-400 hover:text-white transition-colors">Oublié ?</a>
        </div>

        <!-- Button -->
        <button
          type="submit"
          id="submitBtn"
          class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black uppercase tracking-[0.2em] py-4 rounded-2xl transition-all shadow-xl shadow-blue-600/20 flex items-center justify-center gap-3"
        >
          Connexion →
        </button>

      </form>

      <!-- Social -->
      <div class="mt-10 pt-10 border-t border-blue-800/50">
        <p class="text-center text-[10px] font-black text-blue-100/20 uppercase tracking-[0.2em] mb-6">
          Ou continuer avec
        </p>

        <div class="grid grid-cols-2 gap-4">
          <button class="p-3 bg-blue-950/50 border border-blue-800 rounded-xl hover:bg-blue-900 transition-all text-white font-bold text-xs uppercase tracking-widest">
            Google
          </button>
          <button class="p-3 bg-blue-950/50 border border-blue-800 rounded-xl hover:bg-blue-900 transition-all text-white font-bold text-xs uppercase tracking-widest">
            Facebook
          </button>
        </div>
      </div>

    </div>
  </div>

  <!-- JS LOGIN -->
  <script>
    const form = document.getElementById("loginForm");
    const btn = document.getElementById("submitBtn");

    form.addEventListener("submit", function(e) {
      e.preventDefault();

      const email = document.getElementById("email").value;

      btn.innerHTML = "Chargement...";
      btn.disabled = true;

      setTimeout(() => {
        if (email === "admin@fcmunana.com") {
          window.location.href = "admin.html";
        } else {
          window.location.href = "index.html";
        }
      }, 1500);
    });
  </script>

</body>
</html>
