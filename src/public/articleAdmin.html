<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-blue-950 text-white font-sans">

<div class="flex min-h-screen">

  <!-- SIDEBAR -->
  <aside class="w-64 bg-blue-950/50 border-r border-blue-900 p-6 hidden lg:flex flex-col">
    <h2 class="text-xl font-black italic mb-12">
      ADMIN<span class="text-blue-400">CORE</span>
    </h2>

    <nav class="space-y-2 flex-grow">
      <button class="w-full flex items-center gap-3 px-4 py-3 bg-blue-600 rounded-xl text-xs font-bold uppercase">
        Dashboard
      </button>
      <button class="w-full px-4 py-3 text-blue-100/40 hover:text-white">Actualités</button>
      <button class="w-full px-4 py-3 text-blue-100/40 hover:text-white">Effectif</button>
      <button class="w-full px-4 py-3 text-blue-100/40 hover:text-white">Calendrier</button>
      <button class="w-full px-4 py-3 text-blue-100/40 hover:text-white">Paramètres</button>
    </nav>

    <button class="mt-auto text-red-400">Déconnexion</button>
  </aside>

  <!-- MAIN -->
  <main class="flex-grow">

    <!-- HEADER -->
    <header class="flex justify-between items-center px-8 py-6 border-b border-blue-900 bg-blue-950/50">
      <input type="text" placeholder="Rechercher..."
        class="bg-blue-900/30 border border-blue-800 rounded-xl px-4 py-2 text-sm w-64">

      <div class="flex items-center gap-4">
        <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center">
          A
        </div>
      </div>
    </header>

    <!-- CONTENT -->
    <div class="p-8">

      <!-- TITLE -->
      <div class="flex justify-between mb-8">
        <h1 class="text-3xl font-black italic">
          Tableau de <span class="text-blue-400">Bord</span>
        </h1>

        <button class="bg-blue-600 px-4 py-2 rounded-xl text-xs font-bold uppercase">
          Nouvel Article
        </button>
      </div>

      <!-- STATS -->
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-12">

        <div class="bg-blue-900/20 border border-blue-800 p-6 rounded-3xl">
          <p class="text-3xl font-black">12</p>
          <p class="text-xs text-blue-100/40 uppercase">Articles</p>
        </div>

        <div class="bg-blue-900/20 border border-blue-800 p-6 rounded-3xl">
          <p class="text-3xl font-black">25</p>
          <p class="text-xs text-blue-100/40 uppercase">Joueurs</p>
        </div>

        <div class="bg-blue-900/20 border border-blue-800 p-6 rounded-3xl">
          <p class="text-3xl font-black">8</p>
          <p class="text-xs text-blue-100/40 uppercase">Matchs</p>
        </div>

        <div class="bg-blue-900/20 border border-blue-800 p-6 rounded-3xl">
          <p class="text-3xl font-black">42.5K</p>
          <p class="text-xs text-blue-100/40 uppercase">Vues</p>
        </div>

      </div>

      <!-- TABLE ARTICLES -->
      <div class="bg-blue-900/20 border border-blue-800 rounded-3xl overflow-hidden">

        <table class="w-full text-left">
          <thead class="bg-blue-900/30 text-xs text-blue-100/40 uppercase">
            <tr>
              <th class="px-6 py-4">Article</th>
              <th class="px-6 py-4">Catégorie</th>
              <th class="px-6 py-4">Date</th>
              <th class="px-6 py-4 text-right">Actions</th>
            </tr>
          </thead>

          <tbody class="divide-y divide-blue-900">

            <tr>
              <td class="px-6 py-4 flex items-center gap-3">
                <img src="https://via.placeholder.com/50" class="w-12 h-12 rounded-xl">
                <span>Munana gagne le match</span>
              </td>
              <td class="px-6 py-4">
                <span class="bg-blue-600/20 px-3 py-1 text-xs rounded-full">Match</span>
              </td>
              <td class="px-6 py-4 text-xs text-blue-100/40">25/04/2026</td>
              <td class="px-6 py-4 text-right">
                ✏️ 🗑️
              </td>
            </tr>

          </tbody>
        </table>
      </div>

    </div>
  </main>
</div>

<!-- MODAL -->
<div class="fixed inset-0 flex items-center justify-center bg-black/70 hidden">

  <div class="bg-blue-900 p-8 rounded-3xl w-full max-w-xl">

    <h2 class="text-xl font-black mb-6">
      Créer <span class="text-blue-400">Article</span>
    </h2>

    <form class="space-y-4">

      <input type="text" placeholder="Titre"
        class="w-full bg-blue-950 border border-blue-800 rounded-xl p-3">

      <select class="w-full bg-blue-950 border border-blue-800 rounded-xl p-3">
        <option>Match</option>
        <option>Transfert</option>
      </select>

      <textarea placeholder="Contenu"
        class="w-full bg-blue-950 border border-blue-800 rounded-xl p-3"></textarea>

      <button class="w-full bg-blue-600 py-3 rounded-xl uppercase text-xs font-bold">
        Publier
      </button>

    </form>
  </div>
</div>

</body>
</html>
