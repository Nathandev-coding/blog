<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Admin Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-950 text-white">

<div class="min-h-screen flex">

  <!-- SIDEBAR -->
  <aside class="w-64 hidden lg:flex flex-col border-r border-blue-900 bg-blue-950/50 p-6">
    
    <div class="mb-12">
      <h2 class="text-xl font-black italic uppercase tracking-tighter">
        ADMIN <span class="text-blue-400">CORE</span>
      </h2>
    </div>

    <nav class="flex flex-col gap-2 flex-grow">
      <button class="flex items-center gap-3 px-4 py-3 rounded-xl bg-blue-600 text-white text-xs font-bold uppercase tracking-widest">
        Dashboard
      </button>
      <button class="flex items-center gap-3 px-4 py-3 rounded-xl text-blue-100/40 hover:text-white hover:bg-blue-900 text-xs font-bold uppercase tracking-widest">
        Actualités
      </button>
      <button class="flex items-center gap-3 px-4 py-3 rounded-xl text-blue-100/40 hover:text-white hover:bg-blue-900 text-xs font-bold uppercase tracking-widest">
        Effectif
      </button>
      <button class="flex items-center gap-3 px-4 py-3 rounded-xl text-blue-100/40 hover:text-white hover:bg-blue-900 text-xs font-bold uppercase tracking-widest">
        Calendrier
      </button>
      <button class="flex items-center gap-3 px-4 py-3 rounded-xl text-blue-100/40 hover:text-white hover:bg-blue-900 text-xs font-bold uppercase tracking-widest">
        Paramètres
      </button>
    </nav>

    <button class="mt-auto flex items-center gap-3 px-4 py-3 rounded-xl text-red-400 hover:bg-red-500/10 text-xs font-bold uppercase tracking-widest">
      Déconnexion
    </button>
  </aside>

  <!-- MAIN -->
  <main class="flex-grow">

    <!-- HEADER -->
    <header class="px-8 py-6 border-b border-blue-900 flex justify-between items-center bg-blue-950/50 backdrop-blur-xl sticky top-0">
      
      <input 
        type="text"
        placeholder="Rechercher..."
        class="w-64 lg:w-96 bg-blue-900/30 border border-blue-800 rounded-xl py-2 px-4 text-sm focus:outline-none focus:border-blue-400"
      />

      <div class="flex items-center gap-4">
        <button class="p-2 bg-blue-900/30 border border-blue-800 rounded-xl">
          🔔
        </button>

        <div class="flex items-center gap-3 pl-4 border-l border-blue-900">
          <div class="text-right hidden sm:block">
            <p class="text-xs font-bold uppercase">Admin</p>
            <p class="text-[10px] text-blue-100/40 uppercase">Super User</p>
          </div>
          <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center font-black italic">
            A
          </div>
        </div>
      </div>
    </header>

    <!-- CONTENT -->
    <div class="p-8">

      <!-- TITLE -->
      <div class="flex justify-between items-center mb-8">
        <h1 class="text-3xl font-black uppercase italic">
          Tableau de <span class="text-blue-400">Bord</span>
        </h1>

        <button class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-xl text-xs font-bold uppercase tracking-widest">
          + Nouveau
        </button>
      </div>

      <!-- STATS -->
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-12">

        <div class="bg-blue-900/20 border border-blue-800 p-6 rounded-3xl">
          <p class="text-3xl font-black mb-1">12</p>
          <p class="text-xs text-blue-100/40 uppercase">Articles</p>
        </div>

        <div class="bg-blue-900/20 border border-blue-800 p-6 rounded-3xl">
          <p class="text-3xl font-black mb-1">25</p>
          <p class="text-xs text-blue-100/40 uppercase">Joueurs</p>
        </div>

        <div class="bg-blue-900/20 border border-blue-800 p-6 rounded-3xl">
          <p class="text-3xl font-black mb-1">8</p>
          <p class="text-xs text-blue-100/40 uppercase">Matchs</p>
        </div>

        <div class="bg-blue-900/20 border border-blue-800 p-6 rounded-3xl">
          <p class="text-3xl font-black mb-1">42.5K</p>
          <p class="text-xs text-blue-100/40 uppercase">Vues</p>
        </div>

      </div>

      <!-- GRID -->
      <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">

        <!-- ARTICLES -->
        <div class="lg:col-span-8 bg-blue-900/20 border border-blue-800 rounded-3xl p-8">

          <div class="flex justify-between mb-6">
            <h3 class="font-black uppercase italic">Actualités Récentes</h3>
            <button class="text-blue-400 text-xs uppercase">Voir tout</button>
          </div>

          <div class="space-y-4">

            <div class="flex gap-4 p-4 bg-blue-950/30 rounded-2xl border border-blue-900">
              <img src="https://via.placeholder.com/80" class="w-16 h-12 rounded-lg object-cover"/>
              <div>
                <p class="font-bold text-sm">Titre article</p>
                <p class="text-xs text-blue-100/40">Football • 24 Avril</p>
              </div>
            </div>

          </div>
        </div>

        <!-- ACTIVITÉS -->
        <div class="lg:col-span-4 space-y-8">

          <div class="bg-blue-900/20 border border-blue-800 rounded-3xl p-8">
            <h3 class="font-black uppercase italic mb-6">Activités</h3>

            <div class="space-y-4">
              <p class="text-xs">Nouveau joueur ajouté</p>
              <p class="text-xs">Calendrier mis à jour</p>
              <p class="text-xs">Maintenance serveur</p>
            </div>
          </div>

          <div class="bg-gradient-to-br from-blue-600 to-blue-800 rounded-3xl p-8">
            <h3 class="font-black mb-4">Support</h3>
            <button class="w-full py-3 bg-white text-blue-600 rounded-xl text-xs font-bold uppercase">
              Contacter
            </button>
          </div>

        </div>

      </div>

    </div>
  </main>

</div>

</body>
</html>
