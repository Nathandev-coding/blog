<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Article - FC Munana Kipushi</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-blue-950 text-white">

<section class="min-h-screen bg-gradient-to-b from-blue-950 via-blue-950/95 to-blue-950 py-24 px-4 relative overflow-hidden">

  <!-- Background glow -->
  <div class="absolute inset-0">
    <div class="absolute top-[-120px] left-1/2 -translate-x-1/2 w-[700px] h-[700px] bg-blue-500/10 blur-[140px] rounded-full"></div>
  </div>

  <div class="max-w-5xl mx-auto relative z-10">

    <!-- HEADER -->
    <div class="mb-12">
      <span class="text-blue-400 font-bold uppercase tracking-widest text-xs">
        Saison 2023 - 2024
      </span>

      <h1 class="text-5xl md:text-7xl font-black italic uppercase text-white tracking-tighter mt-2">
        Calendrier <span class="text-blue-400">Complet</span>
      </h1>
    </div>

    <!-- FILTERS -->
    <div class="flex flex-wrap gap-3 mb-12">
      <button class="px-5 py-3 rounded-2xl text-xs font-black uppercase tracking-widest bg-blue-600 text-white shadow-lg">
        Tous
      </button>

      <button class="px-5 py-3 rounded-2xl text-xs font-black uppercase tracking-widest bg-blue-900/30 text-blue-100/50 border border-blue-800 hover:border-blue-400/50 hover:text-white transition">
        À venir
      </button>

      <button class="px-5 py-3 rounded-2xl text-xs font-black uppercase tracking-widest bg-blue-900/30 text-blue-100/50 border border-blue-800 hover:border-blue-400/50 hover:text-white transition">
        Terminé
      </button>
    </div>

    <!-- MATCH LIST -->
    <div class="space-y-6">

      <!-- MATCH CARD -->
      <div class="relative bg-blue-900/20 border border-blue-800 rounded-[2rem] p-6 md:p-8 backdrop-blur-md overflow-hidden">

        <!-- watermark -->
        <div class="absolute right-0 top-0 opacity-5 text-white text-[140px] font-black">
          ⚽
        </div>

        <div class="flex flex-col md:flex-row items-center justify-between gap-8 relative z-10">

          <!-- INFO -->
          <div class="min-w-[160px]">
            <span class="inline-block bg-blue-600/20 text-blue-400 text-[10px] font-black px-3 py-1 rounded-full uppercase">
              Championnat
            </span>

            <p class="flex items-center gap-2 text-white font-bold text-sm mt-3">
              📅 22 Avril 2024
            </p>

            <p class="flex items-center gap-2 text-blue-100/40 text-xs mt-1">
              📍 Stade de Kipushi
            </p>
          </div>

          <!-- SCOREBOARD -->
          <div class="flex items-center justify-center gap-8 md:gap-14">

            <!-- HOME -->
            <div class="text-center w-28">
              <div class="w-14 h-14 mx-auto mb-3 bg-blue-900 border border-blue-800 rounded-full flex items-center justify-center text-white font-black">
                M
              </div>
              <p class="text-white text-sm font-bold uppercase">Munana</p>
            </div>

            <!-- SCORE -->
            <div class="flex flex-col items-center">
              <div class="bg-blue-950 border border-blue-800 px-6 py-3 rounded-2xl flex items-center gap-4 shadow-lg">
                <span class="text-blue-400 text-3xl font-black">2</span>
                <span class="text-blue-800 text-xl font-black">-</span>
                <span class="text-white text-3xl font-black">0</span>
              </div>
              <span class="text-blue-400 text-[10px] font-black uppercase mt-2">Terminé</span>
            </div>

            <!-- AWAY -->
            <div class="text-center w-28">
              <div class="w-14 h-14 mx-auto mb-3 bg-blue-900 border border-blue-800 rounded-full flex items-center justify-center text-white font-black">
                L
              </div>
              <p class="text-white text-sm font-bold uppercase">Lualaba</p>
            </div>

          </div>

          <!-- ACTION -->
          <div class="w-12 h-12 rounded-full bg-blue-600/10 border border-blue-600/20 flex items-center justify-center text-blue-400 hover:bg-blue-600 hover:text-white transition cursor-pointer">
            →
          </div>

        </div>
      </div>

      <!-- NEXT MATCH -->
      <div class="relative bg-blue-900/20 border border-blue-800 rounded-[2rem] p-6 md:p-8 backdrop-blur-md overflow-hidden">

        <div class="flex flex-col md:flex-row items-center justify-between gap-8 relative z-10">

          <div class="min-w-[160px]">
            <span class="inline-block bg-blue-600 text-white text-[10px] font-black px-3 py-1 rounded-full uppercase">
              Match à venir
            </span>

            <p class="text-white font-bold text-sm mt-3">📅 28 Avril 2024</p>
            <p class="text-blue-100/40 text-xs mt-1">📍 Stade local</p>
          </div>

          <div class="flex items-center gap-8 md:gap-14">

            <div class="text-center w-28">
              <div class="w-14 h-14 mx-auto mb-3 bg-blue-900 border border-blue-800 rounded-full flex items-center justify-center text-white font-black">
                M
              </div>
              <p class="text-white text-sm font-bold uppercase">Munana</p>
            </div>

            <div class="text-center">
              <span class="text-4xl font-black text-blue-100/10">VS</span>
              <p class="text-blue-400 text-[10px] font-black uppercase mt-2">Bientôt</p>
            </div>

            <div class="text-center w-28">
              <div class="w-14 h-14 mx-auto mb-3 bg-blue-900 border border-blue-800 rounded-full flex items-center justify-center text-white font-black">
                M
              </div>
              <p class="text-white text-sm font-bold uppercase">Adversaire</p>
            </div>

          </div>

          <div class="w-12 h-12 rounded-full bg-blue-600/10 border border-blue-600/20 flex items-center justify-center text-blue-400 hover:bg-blue-600 hover:text-white transition cursor-pointer">
            →
          </div>

        </div>
      </div>

    </div>

  </div>
</section>
</body>
</html>
